<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tricube Tales Solo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="i18n.js"></script>
    <script src="app.js"></script>
</head>

<body>
    <main class="container">
        <section id="game-section">
            <div class="grid">
                <article>
                    <h5 data-i18n="status">Status</h5>
                    <div style="margin-bottom:15px;">
                        <small>
                            <span data-i18n="wins">Wins</span>: <span id="v-count">0</span> | 
                            <span data-i18n="losses">Losses</span>: <span id="l-count">0</span> | 
                            <span data-i18n="deck">Deck</span>: <span id="deck-count">53</span>
                        </small>
                    </div>

                    <div class="oracle-box">
                        <strong data-i18n="oracle_title">Oracle (Probability)</strong>
                        <div class="oracle-grid">
                            <button class="outline contrast" onclick="rollOracle(2)" data-i18n="v_likely">Very Likely (2+)</button>
                            <button class="outline contrast" onclick="rollOracle(3)" data-i18n="likely">Likely (3+)</button>
                            <button class="outline contrast" onclick="rollOracle(4)" data-i18n="maybe">Maybe (4+)</button>
                            <button class="outline contrast" onclick="rollOracle(5)" data-i18n="unlikely">Unlikely (5+)</button>
                            <button class="outline contrast" onclick="rollOracle(6)" data-i18n="v_unlikely">Very Unlikely (6)</button>
                        </div>
                        <span id="oracle-result" class="oracle-res"></span>
                    </div>
                </article>

                <article id="current-card-area">
                    <button id="init-scene-btn" onclick="startAdventure()" style="width:100%" data-i18n="start_adventure">Start Initial Scene</button>
                    
                    <div id="card-content-wrapper" class="hidden">
                        <div id="last-scene-msg" class="last-scene-alert hidden" data-i18n="last_scene_warn">⚠️ FINAL SCENE</div>
                        <div id="card-icon" class="card-display">?</div>
                        <p id="challenge-desc" style="text-align:center; min-height: 3em;"></p>
                        
                        <div class="grid" id="action-buttons">
                            <button class="btn-victory" onclick="resolve(true)" data-i18n="btn_win">Win</button>
                            <button class="btn-loss" onclick="resolve(false)" data-i18n="btn_fail">Failure</button>
                        </div>

                        <div class="grid hidden" id="special-buttons">
                            <button class="primary" onclick="drawCard()" data-i18n="btn_continue">Continue</button>
                            <button id="twist-btn" class="secondary outline hidden" onclick="openTwistModal()" data-i18n="btn_twist">Twist!</button>
                        </div>

                        <div id="final-screen" class="game-over-banner hidden">
                            <h3 data-i18n="game_over">SESSION ENDED</h3>
                            <p id="final-stats"></p>
                            <button class="contrast" onclick="initDeck()" style="width:100%" data-i18n="new_adventure">New Adventure</button>
                        </div>
                    </div>
                    
                    <hr>
                    <button class="secondary outline" onclick="showResetConfirm()" style="font-size: 0.7rem; width: 100%;" data-i18n="reset_deck">Reset Deck</button>
                </article>
            </div>
            
            <details>
                <summary data-i18n="history">Challenge History</summary>
                <div id="card-history" class="history-list"></div>
            </details>
        </section>

        <hr>

        <section id="generators-section">
            <h4 data-i18n="gen_title">Manual Generators</h4>
            <div class="gen-container">
                <div class="gen-section">
                    <h6 data-i18n="cat_loc">📍 Locations</h6>
                    <button class="secondary outline" onclick="rollManualTable('urban', 'loc_urban')" data-i18n="loc_urban">Urban</button>
                    <button class="secondary outline" onclick="rollManualTable('wilderness', 'loc_wild')" data-i18n="loc_wild">Wilderness</button>
                    <button class="secondary outline" onclick="rollManualTable('voyage', 'loc_voyage')" data-i18n="loc_voyage">Voyage</button>
                </div>
                <div class="gen-section">
                    <h6 data-i18n="cat_feat">✨ Features</h6>
                    <button class="secondary outline" onclick="rollManualTable('urban_feat', 'feat_urban')" data-i18n="feat_urban">Urban Feature</button>
                    <button class="secondary outline" onclick="rollManualTable('wild_feat', 'feat_wild')" data-i18n="feat_wild">Wild Feature</button>
                    <button class="secondary outline" onclick="rollManualTable('voyage_feat', 'feat_voyage')" data-i18n="feat_voyage">Voyage Landmark</button>
                </div>
                <div class="gen-section">
                    <h6 data-i18n="cat_ppl">👥 People</h6>
                    <button class="secondary outline" onclick="rollManualTable('urban_ppl', 'ppl_urban')" data-i18n="ppl_urban">Urban People</button>
                    <button class="secondary outline" onclick="rollManualTable('wild_ppl', 'ppl_wild')" data-i18n="ppl_wild">Wild People</button>
                    <button class="contrast outline" onclick="rollFantasyName()" data-i18n="gen_name">Name</button>
                </div>
                <div class="gen-section">
                    <h6 data-i18n="cat_twist">🌀 Twists</h6>
                    <button class="primary outline" onclick="rollTwist('fantasy', 'twist_fantasy')" data-i18n="twist_fantasy">Fantasy</button>
                    <button class="primary outline" onclick="rollTwist('horror', 'twist_horror')" data-i18n="twist_horror">Horror</button>
                    <button class="primary outline" onclick="rollTwist('scifi', 'twist_scifi')" data-i18n="twist_scifi">Sci-Fi</button>
                </div>
            </div>
        </section>

        <footer>
            <div class="lang-select-container">
                <select id="lang-dropdown" onchange="setLang(this.value)">
                    <option value="en">English 🇺🇸</option>
                    <option value="es">Español 🇪🇸</option>
                    <option value="fr">Français 🇫🇷</option>
                    <option value="it">Italiano 🇮🇹</option>
                    <option value="de">Deutsch 🇩🇪</option>
                </select>
            </div>
        </footer>
    </main>

    <dialog id="modal-info">
        <article>
            <header>
                <a href="#close" aria-label="Close" class="close" onclick="closeModal('modal-info')"></a>
                <strong id="modal-title"></strong>
            </header>
            <div id="modal-body"></div>
            <footer><button onclick="closeModal('modal-info')" data-i18n="modal_ok">Got it</button></footer>
        </article>
    </dialog>

    <dialog id="modal-confirm">
        <article>
            <header><strong data-i18n="reset_q">Reset?</strong></header>
            <p data-i18n="reset_text">Current progress will be lost.</p>
            <footer>
                <button class="secondary outline" onclick="closeModal('modal-confirm')" data-i18n="modal_cancel">Cancel</button>
                <button onclick="initDeck()" data-i18n="modal_yes">Yes, reset</button>
            </footer>
        </article>
    </dialog>

    <dialog id="modal-twist-choice">
        <article>
            <header><strong data-i18n="select_genre">Select Genre</strong></header>
            <div class="oracle-grid">
                <button onclick="rollTwist('fantasy', 'twist_fantasy')" data-i18n="twist_fantasy">Fantasy</button>
                <button onclick="rollTwist('horror', 'twist_horror')" data-i18n="twist_horror">Horror</button>
                <button onclick="rollTwist('scifi', 'twist_scifi')" data-i18n="twist_scifi">Sci-Fi</button>
            </div>
            <footer><button class="secondary outline" onclick="closeModal('modal-twist-choice')" data-i18n="modal_cancel">Cancel</button></footer>
        </article>
    </dialog>

    <script>
    </script>
</body>
</html>
